<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — Quantum Tech</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<main>
  <div class="auth-page">
    <div class="auth-card" style="max-width:520px;">

      <!-- Header -->
      <div class="auth-card-header">
        <div class="auth-icon">🎓</div>
        <h2>Create Account</h2>
        <p>Join QuantumTech and start saving on laptops</p>
      </div>

      <!-- Alert area -->
      <div id="signupAlert"></div>

      <!-- Name row -->
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input
            type="text"
            id="firstName"
            placeholder="Thabo"
            oninput="clearFieldError('firstName');"
          />
          <span class="field-error">Required.</span>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input
            type="text"
            id="lastName"
            placeholder="Molefe"
            oninput="clearFieldError('lastName');"
          />
          <span class="field-error">Required.</span>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="signupEmail">Email Address</label>
        <input
          type="email"
          id="signupEmail"
          placeholder="you@example.com"
          oninput="clearFieldError('signupEmail'); clearAlert('signupAlert');"
        />
        <span class="field-error">Please enter a valid email address.</span>
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label for="signupPhone">Phone Number</label>
        <input
          type="tel"
          id="signupPhone"
          placeholder="+267 72 123 456"
          oninput="clearFieldError('signupPhone');"
        />
        <span class="field-error">Please enter your phone number.</span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="signupPassword">Password</label>
        <input
          type="password"
          id="signupPassword"
          placeholder="At least 6 characters"
          oninput="clearFieldError('signupPassword');"
        />
        <span class="field-error">Password must be at least 6 characters.</span>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          type="password"
          id="confirmPassword"
          placeholder="Repeat your password"
          oninput="clearFieldError('confirmPassword');"
        />
        <span class="field-error">Passwords do not match.</span>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary btn-full mt-md" onclick="handleSignup()">
        Create Account →
      </button>

      <!-- Footer links -->
      <div class="auth-footer">
        Already have an account? <a href="login.html">Login</a>
      </div>
      <div class="auth-footer" style="margin-top:8px;">
        <a href="index.html">← Back to Home</a>
      </div>

    </div>
  </div>
</main>

<script src="script.js"></script>
<script>
  buildNav("");

  // Redirect if already logged in
  if (getSession()) {
    window.location.href = "index.html";
  }

  function handleSignup() {
    const firstName   = document.getElementById("firstName").value.trim();
    const lastName    = document.getElementById("lastName").value.trim();
    const email       = document.getElementById("signupEmail").value.trim();
    const phone       = document.getElementById("signupPhone").value.trim();
    const password    = document.getElementById("signupPassword").value;
    const confirmPass = document.getElementById("confirmPassword").value;

    let valid = true;

    // Validate each field
    if (!firstName) { showFieldError("firstName",  "First name is required."); valid = false; }
    if (!lastName)  { showFieldError("lastName",   "Last name is required.");  valid = false; }

    if (!email || !email.includes("@")) {
      showFieldError("signupEmail", "Please enter a valid email address.");
      valid = false;
    }

    if (!phone) { showFieldError("signupPhone", "Phone number is required."); valid = false; }

    if (password.length < 6) {
      showFieldError("signupPassword", "Password must be at least 6 characters.");
      valid = false;
    }

    if (password !== confirmPass) {
      showFieldError("confirmPassword", "Passwords do not match.");
      valid = false;
    }

    if (!valid) return;

    // Attempt registration
    const fullName = firstName + " " + lastName;
    const result   = registerUser(fullName, email, password);

    if (result.ok) {
      showToast("Account created! Welcome, " + firstName + "! 🎉", "success");
      setTimeout(() => { window.location.href = "index.html"; }, 900);
    } else {
      showAlert("signupAlert", "⚠️ " + result.message, "danger");
    }
  }

  // Allow pressing Enter to submit
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") handleSignup();
  });
</script>

</body>
</html>
